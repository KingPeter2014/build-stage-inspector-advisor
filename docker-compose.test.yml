# Lightweight service stack for integration tests and CI pipelines.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   APP_ENV=development LLMOPS_LOCALSTACK_URL=http://localhost:4566 pytest -m integration
#   docker compose -f docker-compose.test.yml down -v

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    tmpfs:
      - /qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # LocalStack is retained as an S3-compatible object-storage test endpoint.
  # It is a source/storage test double, not a deployment target.
  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,secretsmanager,sts
      DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: 1
      PERSISTENCE: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  localstack-init:
    image: amazon/aws-cli:2.15.57
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh -c
    command: >
      "
      aws --endpoint-url=http://localstack:4566 s3 mb s3://llmops-test-data --region us-east-1 &&
      aws --endpoint-url=http://localstack:4566 s3 mb s3://llmops-test-artifacts --region us-east-1 &&
      aws --endpoint-url=http://localstack:4566 secretsmanager create-secret
        --name llmops/test/api-key --secret-string 'test-secret-value' --region us-east-1 &&
      echo 'LocalStack bootstrap complete'
      "
    restart: "no"

  # WireMock can stub external HTTP APIs for future source or LLM tests.
  wiremock:
    image: wiremock/wiremock:3.5.4
    ports:
      - "8080:8080"
    volumes:
      - ./tests/wiremock/mappings:/home/wiremock/mappings:ro
      - ./tests/wiremock/__files:/home/wiremock/__files:ro
    command: --verbose --global-response-templating
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
