name: Promote to Production

# This is the ONLY path to a production deployment.
#
# Trigger options:
#   1. Push a semver tag (v*.*.*) — auto-starts the workflow
#   2. workflow_dispatch — manually specify provider and staging image to promote
#
# Gate: every job in the "deploy" stage targets the GitHub Environment named
#        "production". Configure that Environment in repo Settings →
#        Environments → production with:
#          • Required reviewers: your team leads
#          • Wait timer: optional (e.g. 5 min soak after canary)
#          • Deployment branches: only "main" and "refs/tags/v*"
#
# Credential isolation:
#   Staging secrets → GitHub Environment "staging"
#   Production secrets → GitHub Environment "production"
#   These environments hold separate service principals / IAM roles / WIF
#   bindings that are scoped to production resources only.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver: v1.2.3

  workflow_dispatch:
    inputs:
      provider:
        description: 'Cloud provider to promote'
        required: true
        type: choice
        options: [azure, aws, gcp, all]
        default: all
      staging_image_tag:
        description: 'Image tag from staging (e.g. sha-abc1234). Leave blank to use latest.'
        required: false
        default: ''

env:
  TF_VERSION: '1.8.0'

jobs:
  # ── 1. Pre-promotion gate: full regression + safety evals on staging ──────────
  pre-promotion-eval:
    name: Pre-promotion eval gate (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt

      - name: Regression eval — open_source suite
        run: python scripts/run_evals.py --suite regression --min-pass-rate 0.92
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Safety eval — all providers
        run: |
          python scripts/run_evals.py --suite safety --provider azure --min-pass-rate 0.98
          python scripts/run_evals.py --suite safety --provider aws   --min-pass-rate 0.98
          python scripts/run_evals.py --suite safety --provider gcp   --min-pass-rate 0.98
        env:
          AZURE_CONTENT_SAFETY_ENDPOINT: ${{ secrets.AZURE_CONTENT_SAFETY_ENDPOINT }}
          AZURE_CONTENT_SAFETY_KEY: ${{ secrets.AZURE_CONTENT_SAFETY_KEY }}
          BEDROCK_GUARDRAIL_ID: ${{ secrets.BEDROCK_GUARDRAIL_ID }}
          PERSPECTIVE_API_KEY: ${{ secrets.PERSPECTIVE_API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: pre-promotion-eval-reports
          path: reports/

  # ── 2. Smoke tests against staging (verify what we're about to promote) ───────
  staging-smoke:
    name: Smoke test staging gateway
    runs-on: ubuntu-latest
    needs: pre-promotion-eval
    environment: staging

    strategy:
      matrix:
        provider: [azure, aws, gcp]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install httpx pytest

      - name: Run smoke tests against staging ${{ matrix.provider }}
        run: pytest tests/smoke/ -m smoke -v --tb=short
        env:
          APP_ENV: staging
          GATEWAY_URL: ${{ secrets[format('{0}_GATEWAY_URL_STAGING', upper(matrix.provider))] }}
          X_USER_ID: ci-smoke-user
          X_USER_ROLE: developer

  # ── 3a. Promote Azure to production ──────────────────────────────────────────
  promote-azure:
    name: Promote Azure to production
    runs-on: ubuntu-latest
    needs: [pre-promotion-eval, staging-smoke]
    # GitHub Environment "production" enforces required-reviewer approval here
    environment: production
    if: >
      github.event.inputs.provider == 'azure' ||
      github.event.inputs.provider == 'all'   ||
      github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC — production identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (production state)
        working-directory: infra/terraform/envs/azure
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG_PROD }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_SA_PROD }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=llmops-production.tfstate"

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.staging_image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=sha-${TAG:0:7}" >> "$GITHUB_OUTPUT"

      - name: Terraform apply (production)
        working-directory: infra/terraform/envs/azure
        run: |
          terraform apply -auto-approve \
            -var="env=production" \
            -var="gateway_image=${{ secrets.ACR_LOGIN_SERVER_PROD }}/llmops-gateway:${{ steps.tag.outputs.tag }}"
        env:
          TF_VAR_project: llmops
          TF_VAR_location: ${{ secrets.AZURE_LOCATION_PROD || 'eastus2' }}

      - name: Post-deploy smoke test (production)
        run: pytest tests/smoke/ -m smoke -v --tb=short
        env:
          APP_ENV: production
          GATEWAY_URL: ${{ secrets.AZURE_GATEWAY_URL_PROD }}
          X_USER_ID: ci-smoke-prod
          X_USER_ROLE: developer

  # ── 3b. Promote AWS to production ────────────────────────────────────────────
  promote-aws:
    name: Promote AWS to production
    runs-on: ubuntu-latest
    needs: [pre-promotion-eval, staging-smoke]
    environment: production
    if: >
      github.event.inputs.provider == 'aws'  ||
      github.event.inputs.provider == 'all'  ||
      github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — production role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (production state)
        working-directory: infra/terraform/envs/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_PROD }}" \
            -backend-config="key=llmops/production/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-locks-prod"

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.staging_image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=sha-${TAG:0:7}" >> "$GITHUB_OUTPUT"

      - name: Terraform apply (production)
        working-directory: infra/terraform/envs/aws
        run: |
          terraform apply -auto-approve \
            -var="env=production" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="gateway_image=${{ secrets.ECR_REPO_URL_PROD }}:${{ steps.tag.outputs.tag }}"

      - name: Post-deploy smoke test (production)
        run: pytest tests/smoke/ -m smoke -v --tb=short
        env:
          APP_ENV: production
          GATEWAY_URL: ${{ secrets.AWS_GATEWAY_URL_PROD }}
          X_USER_ID: ci-smoke-prod
          X_USER_ROLE: developer

  # ── 3c. Promote GCP to production ────────────────────────────────────────────
  promote-gcp:
    name: Promote GCP to production
    runs-on: ubuntu-latest
    needs: [pre-promotion-eval, staging-smoke]
    environment: production
    if: >
      github.event.inputs.provider == 'gcp'  ||
      github.event.inputs.provider == 'all'  ||
      github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — production service account)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_PROD }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (production state)
        working-directory: infra/terraform/envs/gcp
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_PROD }}" \
            -backend-config="prefix=llmops/production"

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.staging_image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=sha-${TAG:0:7}" >> "$GITHUB_OUTPUT"

      - name: Terraform apply (production)
        working-directory: infra/terraform/envs/gcp
        run: |
          terraform apply -auto-approve \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID_PROD }}" \
            -var="env=production" \
            -var="gcp_region=${{ secrets.GCP_REGION_PROD || 'us-central1' }}" \
            -var="gateway_image=${{ secrets.AR_REPO_URL_PROD }}/gateway:${{ steps.tag.outputs.tag }}"

      - name: Post-deploy smoke test (production)
        run: pytest tests/smoke/ -m smoke -v --tb=short
        env:
          APP_ENV: production
          GATEWAY_URL: ${{ secrets.GCP_GATEWAY_URL_PROD }}
          X_USER_ID: ci-smoke-prod
          X_USER_ROLE: developer

  # ── 4. Tag the commit as released ────────────────────────────────────────────
  mark-released:
    name: Mark commit as released
    runs-on: ubuntu-latest
    needs: [promote-azure, promote-aws, promote-gcp]
    if: always() && !failure() && !cancelled()

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Promoted to production from staging.
            Providers: azure, aws, gcp
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
