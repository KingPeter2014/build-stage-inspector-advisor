model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Local model via vLLM (uncomment when vLLM is running)
  # - model_name: llama-3-local
  #   litellm_params:
  #     model: openai/meta-llama/Llama-3.2-3B-Instruct
  #     api_base: http://localhost:8080/v1
  #     api_key: fake

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 5
  fallbacks:
    - gpt-4o:
        - claude-sonnet
    - claude-sonnet:
        - gpt-4o

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  cache: true
  cache_params:
    type: redis
    host: localhost
    port: 6379
    ttl: 3600                   # 1-hour TTL for exact-match LiteLLM cache
    # Semantic cache is handled by serving/cache/semantic_cache.py at the
    # gateway layer (similarity threshold 0.92, same TTL).
    # Set REDIS_URL env var to share the Redis instance between both layers.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  alerting: ["slack"]
  spend_logs_url: http://localhost:5000
