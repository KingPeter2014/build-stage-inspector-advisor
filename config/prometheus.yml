global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development

scrape_configs:
  - job_name: llmops_gateway
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics

  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics

  - job_name: qdrant
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
