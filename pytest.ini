[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests — no external dependencies, always run in CI
    integration: Integration tests — requires local services (Qdrant, Redis via docker-compose.test.yml)
    eval: Eval suite tests — requires LLM API access
    slow: Slow tests — fine-tuning, large dataset processing
    requires_cloud: Tests that need real cloud credentials (Azure/AWS/GCP); skipped unless LLMOPS_RUN_CLOUD_TESTS=1
    requires_localstack: Tests that need LocalStack running; skipped unless LLMOPS_LOCALSTACK_URL is set
    smoke: Post-deployment smoke tests — run against a live gateway; requires GATEWAY_URL env var

addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-omit=tests/*,scripts/*,infra/*
    -m "not integration and not eval and not slow and not requires_cloud and not smoke"
